name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Запуск каждый день в полночь по UTC
    - cron: '0 0 * * *' 

# Даем права пайплайну на запись, чтобы он мог публиковать отчеты
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # Настраиваем Node.js и кэшируем npm зависимости
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        
    # Установка зависимостей
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    # Сохраняем базовый HTML-отчет Playwright
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report
        retention-days: 10

    # Получаем историю предыдущих тестов для Allure, чтобы графики не сбрасывались
    - name: Load Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # Генерируем Allure отчет актуальной Node-версией (без проблемного Docker)
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@v1.11
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    # Публикуем статичный сайт на GitHub Pages
    - name: Deploy Allure to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history