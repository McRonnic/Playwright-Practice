name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Запуск каждый день в полночь. ВНИМАНИЕ: время в cron указывается по UTC!
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Настраиваем Node.js и кэшируем npm зависимости
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    # Установка зависимостей
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Запуск тестов. Добавим id, чтобы ссылаться на этот шаг при сборке истории
    - name: Run Playwright tests
      id: playwright-tests
      run: npx playwright test

    # Сохраняем стандартный HTML-отчет Playwright как артефакт (один раз, без дублей)
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10

    # --- СЕКЦИЯ ALLURE REPORT ---

   # 1. Скачиваем историю прошлых запусков из ветки gh-pages в папку allure-results/history
    - name: Load Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir # качаем во временную папку

    # Переносим историю в правильное место, чтобы Allure её подхватил
    - name: Copy Allure history
      if: always()
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        cp -r gh-pages-dir/history/* allure-results/history/ || true

    # 2. Генерируем отчет с помощью официального экшена Allure
    - name: Build Allure Report
      uses: allure-framework/allure-github-actions@v1
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report
        allure_version: 2.32.0 # Используем свежую стабильную версию Allure

    # 3. Публикуем сгенерированный ГОТОВЫЙ отчет (папку allure-report) в ветку gh-pages
    - name: Deploy Allure to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report # Меняем allure-history на allure-report