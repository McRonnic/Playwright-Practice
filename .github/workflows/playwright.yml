name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Запуск каждый день в полночь. ВНИМАНИЕ: время в cron указывается по UTC!
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Настраиваем Node.js и кэшируем npm зависимости
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    # Установка зависимостей
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Запуск тестов. Добавим id, чтобы ссылаться на этот шаг при сборке истории
    - name: Run Playwright tests
      id: playwright-tests
      run: npx playwright test

    # Сохраняем стандартный HTML-отчет Playwright как артефакт (один раз, без дублей)
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10

    # --- СЕКЦИЯ ALLURE REPORT ---

    # 1. СКАЧИВАЕМ ИСТОРИЮ: Берем файлы из ветки gh-pages, чтобы Allure добавил графики трендов
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # 2. ГЕНЕРИРУЕМ ОТЧЕТ: Передаем результаты И историю
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@v1.9
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20 # Опционально: хранить историю последних 20 запусков

    # 3. ДЕПЛОИМ: Публикуем сгенерированную папку на GitHub Pages
    - name: Deploy Allure to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history